<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consultation Detail — Consultation Intelligence</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app">
    <div class="header">
      <div>
        <h1 id="consultationTitle">Loading...</h1>
        <div class="header-meta" id="consultationMeta"></div>
      </div>
      <a href="/" class="btn btn-ghost">← Back to Dashboard</a>
    </div>

    <div id="statusBar" class="status-bar"></div>

    <div class="tabs" id="mainTabs">
      <button class="tab active" data-tab="scorecard">Scorecard</button>
      <button class="tab" data-tab="extractions">Extractions</button>
      <button class="tab" data-tab="transcript">Transcript</button>
      <button class="tab" data-tab="case-study">Case Study</button>
    </div>

    <!-- Scorecard Tab -->
    <div class="tab-panel active" id="panel-scorecard">
      <div id="scorecardContent"></div>
    </div>

    <!-- Extractions Tab -->
    <div class="tab-panel" id="panel-extractions">
      <div id="extractionsContent"></div>
    </div>

    <!-- Case Study Tab -->
    <div class="tab-panel" id="panel-case-study">
      <div id="caseStudyContent"></div>
    </div>

    <!-- Transcript Tab -->
    <div class="tab-panel" id="panel-transcript">
      <div class="transcript-viewer">
        <div class="transcript-header">
          <h2>Transcript</h2>
          <input type="search" id="transcriptSearch" placeholder="Search transcript...">
        </div>
        <div id="transcriptContent" class="transcript-content"></div>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script type="module" src="/js/app.js"></script>
  <script type="module" src="/js/consultation.js"></script>
</body>
</html>
