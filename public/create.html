<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Consultation — Consultation Intelligence</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>Create Consultation</h1>
      <div class="header-actions">
        <a href="/" class="btn btn-ghost">← Back to Dashboard</a>
        <div class="user-widget">
          <span id="userDisplayName"></span>
          <form action="/auth/logout" method="POST">
            <button type="submit" class="btn btn-ghost btn-sm">Sign out</button>
          </form>
        </div>
      </div>
    </div>

    <div class="form-section">
      <form id="createForm">
        <div class="form-group">
          <label for="clientName">Client Name *</label>
          <input type="text" id="clientName" name="client_name" required placeholder="Enter client name">
        </div>

        <div class="form-group">
          <label for="consultantName">Consultant Name</label>
          <input type="text" id="consultantName" name="consultant_name" placeholder="Enter consultant name">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="consultationDate">Consultation Date</label>
            <input type="date" id="consultationDate" name="consultation_date">
          </div>

          <div class="form-group">
            <label for="durationMinutes">Duration (minutes)</label>
            <input type="number" id="durationMinutes" name="duration_minutes" min="0" placeholder="e.g. 45">
          </div>
        </div>

        <div class="form-group">
          <label for="transcriptText">Transcript *</label>
          <textarea id="transcriptText" name="transcript_text"
            rows="20" required
            placeholder="Paste the consultation transcript here..."></textarea>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Create Consultation</button>
          <a href="/" class="btn">Cancel</a>
        </div>
      </form>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script type="module" src="/js/app.js"></script>
  <script type="module" src="/js/create.js"></script>
</body>
</html>
