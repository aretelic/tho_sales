<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consultation Intelligence — Dashboard</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>Consultation Intelligence</h1>
      <div class="header-actions">
        <a href="/collections.html" class="btn btn-ghost">Collections</a>
        <a href="/case-studies.html" class="btn btn-ghost">Case Studies</a>
        <a href="/drive-import.html" class="btn btn-ghost">↓ Import from Drive</a>
        <a href="/create.html" class="btn btn-primary">+ New Consultation</a>
        <div class="user-widget">
          <span id="userDisplayName"></span>
          <form action="/auth/logout" method="POST">
            <button type="submit" class="btn btn-ghost btn-sm">Sign out</button>
          </form>
        </div>
      </div>
    </div>

    <div class="calendar-section">
      <h2>Upcoming</h2>
      <div id="calendarEvents"></div>
    </div>

    <div class="dashboard-section">
      <h2>Consultations</h2>
      <div id="consultationsTable"></div>
      <div id="emptyState" class="empty-state" style="display: none;">
        <h2>No consultations yet</h2>
        <p>Create your first consultation to get started analyzing sales transcripts.</p>
        <a href="/create.html" class="btn btn-primary">Create Consultation</a>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script type="module" src="/js/app.js"></script>
  <script type="module" src="/js/dashboard.js"></script>
</body>
</html>
