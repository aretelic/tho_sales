<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Import from Drive — Consultation Intelligence</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app">
    <div class="header">
      <div>
        <h1>Import from Drive</h1>
        <div class="header-meta" id="folderMeta">Loading files…</div>
      </div>
      <div class="header-actions">
        <a href="/" class="btn btn-ghost">← Back to Dashboard</a>
        <div class="user-widget">
          <span id="userDisplayName"></span>
          <form action="/auth/logout" method="POST">
            <button type="submit" class="btn btn-ghost btn-sm">Sign out</button>
          </form>
        </div>
      </div>
    </div>

    <div id="driveContent"></div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script type="module" src="/js/app.js"></script>
  <script type="module" src="/js/drive.js"></script>
</body>
</html>
